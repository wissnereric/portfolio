name: Update Survivor Rankings

on:
  schedule:
    # Every Thursday at 23:00 UTC (6pm ET / 7pm ET during DST)
    - cron: "0 23 * * 4"
  workflow_dispatch:

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run rankings updater
        id: update
        run: python scripts/update_rankings.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated ratings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add survivor/ratings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update rankings after episode ${{ steps.update.outputs.episode_num }}"
            git push
          fi
